<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Medical Research Orchestrator</title>
    <link rel="stylesheet" href="{{ static_base }}/main.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Medical Research Orchestrator</h1>
    </header>

    <main class="app-main">
      <section class="query-form">
        <form id="research-form">
          <label for="query-input">查詢關鍵字</label>
          <textarea id="query-input" name="query" rows="3" required></textarea>

          <label for="max-articles">最多文獻數 (選填)</label>
          <input
            id="max-articles"
            type="number"
            name="max_articles"
            min="1"
            max="100"
            placeholder="20"
          />

          <button type="submit">開始研究</button>
        </form>
      </section>

      <section class="stream-output">
        <h2>Streaming Updates</h2>
        <pre id="stream-log" class="stream-log"></pre>
      </section>

      <section class="telemetry">
        <h2>Telemetry</h2>
        <pre id="telemetry-log" class="telemetry-log"></pre>
      </section>

      <section class="fallback">
        <h2>Fallback</h2>
        <pre id="fallback-log" class="fallback-log"></pre>
      </section>
    </main>

    <script>
      const form = document.getElementById("research-form");
      const streamLog = document.getElementById("stream-log");
      const telemetryLog = document.getElementById("telemetry-log");
      const fallbackLog = document.getElementById("fallback-log");
      const endpoint = "{{ ui_post_endpoint }}";

      function appendLine(target, payload) {
        if (!payload) {
          return;
        }
        const already = target.textContent ? target.textContent + "\n" : "";
        target.textContent = `${already}${payload}`;
        target.scrollTop = target.scrollHeight;
      }

      async function postQuery(event) {
        event.preventDefault();
        streamLog.textContent = "";
        telemetryLog.textContent = "";
        fallbackLog.textContent = "";

        const formData = new FormData(form);
        const response = await fetch(endpoint, {
          method: "POST",
          body: formData,
        });

        if (!response.ok) {
          appendLine(streamLog, `ERROR: ${response.status}`);
          return;
        }

        const reader = response.body?.getReader();
        const decoder = new TextDecoder();
        if (!reader) {
          appendLine(streamLog, "Streaming not supported.");
          return;
        }

        while (true) {
          const { value, done } = await reader.read();
          if (done) {
            break;
          }
          const chunk = decoder.decode(value, { stream: true });
          chunk
            .split("\n")
            .filter(Boolean)
            .forEach((line) => {
              try {
                const data = JSON.parse(line);
                if (data.event === "update") {
                  appendLine(streamLog, `[${data.segment}] ${data.content}`);
                } else if (data.event === "summary") {
                  appendLine(telemetryLog, JSON.stringify(data.telemetry, null, 2));
                  appendLine(
                    fallbackLog,
                    JSON.stringify(data.fallback || [], null, 2)
                  );
                } else if (data.event === "error") {
                  appendLine(streamLog, `ERROR: ${data.message}`);
                }
              } catch (error) {
                appendLine(streamLog, `PARSE ERROR: ${error}`);
              }
            });
        }
      }

      form.addEventListener("submit", postQuery);
    </script>
  </body>
</html>
